name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Backend
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff (if available)
        run: |
          pip install ruff --quiet
          ruff check . --select E,W,F --ignore E501 || true

      - name: Type-check with mypy (if available)
        run: |
          pip install mypy --quiet
          mypy backend/ --ignore-missing-imports --no-strict-optional || true

      - name: Start server and health-check
        env:
          MAINLAYER_API_KEY: ml_test_placeholder
        run: |
          uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -f http://localhost:8000/health

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (TypeScript / Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type-check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000/api/v1

  # ---------------------------------------------------------------------------
  # Docker Compose smoke test
  # ---------------------------------------------------------------------------
  docker:
    name: Docker Compose build
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cp backend/.env.example backend/.env
          sed -i 's/ml_live_xxxxxxxxxxxxxxxxxxxx/ml_test_placeholder/' backend/.env

      - name: Build images
        run: docker compose build

      - name: Start stack
        run: |
          MAINLAYER_API_KEY=ml_test_placeholder docker compose up -d
          sleep 15

      - name: Health-check backend
        run: curl -f http://localhost:8000/health

      - name: Tear down
        if: always()
        run: docker compose down
